actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No public API surface exists on Rubicon's own domain to document or
    model, and no WebSocket/server-push transport exists to justify an
    AsyncAPI document. apis.yml records apis: [] and this repository omits
    openapi/plans/rate-limits/finops/collections artifacts rather than
    fabricate endpoints, pricing tiers, or limits that are not publicly
    sourced. Should Rubicon (or Routeware, as successor to the divested
    fleet/smart-city business) publish real developer documentation in the
    future, this entry should be revisited.
